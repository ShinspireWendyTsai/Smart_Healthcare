<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=3.0, user-scalable=yes">
    <title>訂單確認資訊</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="mobile-container">
        <header class="header">
            <i class="fas fa-arrow-left" onclick="goBack()" style="cursor: pointer;"></i>
            <div class="header-title">訂單確認資訊</div>
            <div style="width: 20px;"></div>
        </header>

        <main class="main-content">
            <section class="card">
                <div class="card-header">
                    <div>確認頁面資訊</div>
                    <span class="badge badge-accent">請確認</span>
                </div>

                <div class="detail-list">
                    <div class="detail-row">
                        <span class="detail-label">服務項目</span>
                        <span class="detail-value detail-value-left" id="confirmServiceName">專業居家照護服務</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">服務時間</span>
                        <span class="detail-value detail-value-left" id="confirmServiceTime">2026/02/15 10:00</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">服務地址</span>
                        <span class="detail-value detail-value-left" id="confirmAddress">未填寫</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">聯絡人姓名</span>
                        <span class="detail-value detail-value-left" id="confirmContactName">未填寫</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">聯絡人電話</span>
                        <span class="detail-value detail-value-left" id="confirmContactPhone">未填寫</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">折扣碼</span>
                        <span class="detail-value detail-value-left" id="confirmPromoCode">未使用</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">備註</span>
                        <span class="detail-value detail-value-left" id="confirmNote">無</span>
                    </div>
                </div>
            </section>

            <section class="card">
                <div class="card-header">
                    <div>匯款資訊</div>
                    <span class="order-status pending">待匯款</span>
                </div>

                <div class="detail-list" style="margin-bottom: 12px;">
                    <div class="detail-row">
                        <span class="detail-label">公司名</span>
                        <span class="detail-value detail-value-left">全方位智慧貼身照護股份有限公司</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">銀行</span>
                        <span class="detail-value detail-value-left">玉山商業銀行 南京東路分行（808）</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">匯款帳號</span>
                        <span class="detail-value detail-value-left" style="font-family: monospace; letter-spacing: 0.4px;">808-0123-4567-8901</span>
                    </div>
                </div>

                <div class="checkout-summary">
                    <div class="checkout-row">
                        <span>服務小計</span>
                        <span id="confirmSubtotal">NT$ 2,400</span>
                    </div>
                    <div class="checkout-row total">
                        <span>應付金額</span>
                        <span id="confirmTotal">NT$ 2,400</span>
                    </div>
                </div>

                <div style="font-size: 13px; color: #6B7280; line-height: 1.7; margin-bottom: 12px;">
                    請於3天內完成匯款，並至訂單頁回報帳號資訊，以利後續核對。
                </div>

                <button class="btn btn-accent btn-block" id="confirmOrderBtn" type="button">確認送出</button>
            </section>
        </main>
    </div>

    <script src="js/main.js"></script>
    <script>
        function setText(id, value, fallback = '-') {
            const element = document.getElementById(id);
            if (!element) return;
            element.textContent = value || fallback;
        }

        function loadConfirmData() {
            const rawData = sessionStorage.getItem('checkoutConfirmData');
            if (!rawData) return;

            try {
                const data = JSON.parse(rawData);
                setText('confirmServiceName', data.serviceName, '專業居家照護服務');
                setText('confirmServiceTime', data.serviceTime, '2026/02/15 10:00');
                setText('confirmAddress', data.address, '未填寫');
                setText('confirmContactName', data.contactName, '未填寫');
                setText('confirmContactPhone', data.contactPhone, '未填寫');
                setText('confirmPromoCode', data.promoCode, '未使用');
                setText('confirmNote', data.note, '無');
                setText('confirmSubtotal', data.subtotal, 'NT$ 2,400');
                setText('confirmTotal', data.total, 'NT$ 2,400');
            } catch (error) {
                console.warn('checkoutConfirmData 解析失敗', error);
            }
        }

        function submitOrderFinal() {
            sessionStorage.removeItem('checkoutConfirmData');

            if (typeof showToast === 'function') {
                showToast('訂單已送出，請至訂單頁查看待付款狀態', 'success');
            }

            setTimeout(() => {
                navigateTo('orders.html');
            }, 600);
        }

        document.addEventListener('DOMContentLoaded', function() {
            loadConfirmData();

            const confirmOrderBtn = document.getElementById('confirmOrderBtn');
            if (confirmOrderBtn) {
                confirmOrderBtn.addEventListener('click', function() {
                    submitOrderFinal();
                });
            }
        });
    </script>
</body>
</html>
