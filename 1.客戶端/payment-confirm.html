<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=3.0, user-scalable=yes">
    <title>前往付款</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="mobile-container">
        <header class="header">
            <i class="fas fa-arrow-left" onclick="goBack()" style="cursor: pointer;"></i>
            <div class="header-title">前往付款</div>
            <div style="width: 20px;"></div>
        </header>

        <main class="main-content">
            <section class="card">
                <div class="card-header">
                    <div>匯款資訊</div>
                    <span class="order-status pending">待匯款</span>
                </div>

                <div class="detail-list" style="margin-bottom: 12px;">
                    <div class="detail-row">
                        <span class="detail-label">公司名</span>
                        <span class="detail-value detail-value-left">全方位智慧貼身照護股份有限公司</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">銀行</span>
                        <span class="detail-value detail-value-left">玉山商業銀行 南京東路分行（808）</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">匯款帳號</span>
                        <span class="detail-value detail-value-left" style="font-family: monospace; letter-spacing: 0.4px;">808-0123-4567-8901</span>
                    </div>
                </div>

                <div class="checkout-summary">
                    <div class="checkout-row">
                        <span>服務小計</span>
                        <span id="confirmSubtotal">NT$ 2,400</span>
                    </div>
                    <div class="checkout-row total">
                        <span>應付金額</span>
                        <span id="confirmTotal">NT$ 2,400</span>
                    </div>
                </div>

                <div style="font-size: 13px; color: #6B7280; line-height: 1.7; margin-bottom: 12px;">
                    請於 3天內完成匯款，並保留轉帳明細以利後續核對。
                </div>

                <div style="padding: 14px; border: 1px solid rgba(38, 166, 154, 0.2); border-radius: 16px; background: rgba(38, 166, 154, 0.04);">
                    <div style="font-size: 15px; font-weight: 700; color: #374151; margin-bottom: 8px;">匯款回報</div>
                    <div style="font-size: 13px; color: #6B7280; line-height: 1.7; margin-bottom: 10px;">
                        匯款完成後，請輸入您的轉出帳戶後 5 碼，協助我們加速核對款項。
                    </div>
                    <input
                        id="accountLastFive"
                        class="form-control"
                        type="text"
                        inputmode="numeric"
                        maxlength="5"
                        placeholder="請輸入帳戶後 5 碼"
                        aria-label="轉出帳戶後五碼"
                        style="margin-bottom: 10px;"
                    >
                    <button class="btn btn-accent btn-block" id="submitLastFiveBtn" type="button">送出匯款資訊</button>
                    <div id="paymentVerifyMessage" style="display: none; margin-top: 10px; font-size: 13px; color: #2E7D6F; line-height: 1.6;">
                        已收到您的匯款回報，款項核對完成後將以系統訊息通知您，屆時再請留意。
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="js/main.js"></script>
    <script>
        function setText(id, value, fallback = '-') {
            const element = document.getElementById(id);
            if (!element) return;
            element.textContent = value || fallback;
        }

        function loadConfirmData() {
            const rawData = sessionStorage.getItem('checkoutConfirmData');
            if (!rawData) return;

            try {
                const data = JSON.parse(rawData);
                setText('confirmSubtotal', data.subtotal, 'NT$ 2,400');
                setText('confirmTotal', data.total, 'NT$ 2,400');
            } catch (error) {
                console.warn('checkoutConfirmData 解析失敗', error);
            }
        }

        function submitLastFiveDigits() {
            const accountLastFiveInput = document.getElementById('accountLastFive');
            const submitLastFiveBtn = document.getElementById('submitLastFiveBtn');
            const paymentVerifyMessage = document.getElementById('paymentVerifyMessage');

            if (!accountLastFiveInput || !submitLastFiveBtn || !paymentVerifyMessage) {
                return;
            }

            const value = accountLastFiveInput.value.trim();
            const isValid = /^\d{5}$/.test(value);

            if (!isValid) {
                if (typeof showToast === 'function') {
                    showToast('請輸入正確的帳戶後 5 碼（數字）', 'warning');
                }
                accountLastFiveInput.focus();
                return;
            }

            paymentVerifyMessage.style.display = 'block';
            accountLastFiveInput.readOnly = true;
            submitLastFiveBtn.disabled = true;
            submitLastFiveBtn.textContent = '已送出';

            if (typeof showToast === 'function') {
                showToast('匯款資訊已送出', 'success');
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            loadConfirmData();

            const submitLastFiveBtn = document.getElementById('submitLastFiveBtn');
            if (submitLastFiveBtn) {
                submitLastFiveBtn.addEventListener('click', function() {
                    submitLastFiveDigits();
                });
            }
        });
    </script>
</body>
</html>
